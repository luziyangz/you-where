version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: youzainaye_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-youzainaye}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-youzainaye_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_password}
    volumes:
      - mysql_data:/var/lib/mysql
      # 挂载初始化 SQL 脚本
      - ./scripts/mysql_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - app_network

  backend:
    build: .
    container_name: youzainaye_backend
    restart: always
    environment:
      - DB_BACKEND=mysql
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-youzainaye_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-user_password}
      - MYSQL_DB=${MYSQL_DB:-youzainaye}
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
